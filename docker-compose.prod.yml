version: '3.8'

# ── CareRemind Production Compose ────────────────────────────
# Database: Supabase (external — no postgres service here)
# Target: ~800 concurrent doctors on a single server
# Scale path: add more fastapi replicas + PgBouncer for 2000+ doctors

services:
  nginx:
    build: ./infrastructure/nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      fastapi:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  fastapi:
    build: ./services/fastapi
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - WEB_CONCURRENCY=4
      # DB pool tuned for 800 concurrent doctors:
      # 4 workers × 15 connections = 60 total → sufficient for 800 req/s at typical clinic load
      - DB_POOL_SIZE=15
      - DB_MAX_OVERFLOW=15
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build: ./services/worker
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    deploy:
      replicas: 3  # 3 Celery workers for reminder delivery throughput

  scheduler:
    build: ./services/scheduler
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    # Persistence: AOF (Append-Only File) — survive container restarts
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ssl_certs:
  certbot_webroot:
  redis_data:

