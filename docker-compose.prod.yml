version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  fastapi:
    image: careremind/fastapi:latest
    restart: always

  django:
    image: careremind/django:latest
    restart: always

  worker:
    image: careremind/worker:latest
    restart: always
    deploy:
      replicas: 2

  scheduler:
    image: careremind/scheduler:latest
    restart: always

  whatsapp:
    image: careremind/whatsapp:latest
    restart: always

  dashboard:
    image: careremind/dashboard:latest
    restart: always

  landing:
    image: careremind/landing:latest
    restart: always

volumes:
  caddy_data:
  caddy_config:
