version: '3.8'

services:
  nginx:
    build: ./infrastructure/nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      fastapi:
        condition: service_healthy
      frontend:
        condition: service_started

  fastapi:
    build: ./services/fastapi
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build: ./services/worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    deploy:
      replicas: 2

  scheduler:
    build: ./services/scheduler
    restart: always
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ssl_certs:
  certbot_webroot:
