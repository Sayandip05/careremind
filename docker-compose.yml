version: '3.8'

services:
  fastapi:
    build: ./services/fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/fastapi:/app

  worker:
    build: ./services/worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/worker:/app

  scheduler:
    build: ./services/scheduler
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/scheduler:/app


  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: careremind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d careremind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    volumes:
      - ./monitoring/grafana:/etc/grafana

volumes:
  postgres_data:
