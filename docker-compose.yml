version: '3.8'

services:
  nginx:
    build: ./infrastructure/nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
      - frontend
    restart: unless-stopped

  fastapi:
    build: ./services/fastapi
    # Dev: override to single uvicorn for hot-reload support
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/fastapi:/app

  worker:
    build: ./services/worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/worker:/app

  scheduler:
    build: ./services/scheduler
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/scheduler:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: careremind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d careremind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

