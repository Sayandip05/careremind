# ──────────────────────────────────────────────────────────────
# CareRemind — Nginx Reverse Proxy Configuration
# ──────────────────────────────────────────────────────────────
#
# Routes:
#   /api/*        → FastAPI backend  (port 8000)
#   /health*      → FastAPI backend  (health checks)
#   /*            → React frontend   (port 3000)
#
# Features:
#   - SSL/TLS termination (Let's Encrypt via certbot)
#   - Gzip compression
#   - Security headers (HSTS, XSS, Content-Type, Clickjacking)
#   - Rate limiting (login endpoint)
#   - Request size limits (upload protection)
#   - WebSocket support (hot reload in dev)
#   - Static file caching
#   - Upstream health checks
# ──────────────────────────────────────────────────────────────

# ── Worker Configuration ─────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ───────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate Limiting Zones ─────────────────────────────────
    # Login endpoint: 5 requests per second per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    # General API: 30 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Webhook endpoints: 50 requests per second (Meta sends bursts)
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=50r/s;

    # ── Upstream Definitions ────────────────────────────────
    upstream fastapi_backend {
        server fastapi:8000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ── Request Size Limits ─────────────────────────────────
    # Default: 1MB for most requests
    client_max_body_size 1m;

    # ── HTTP → HTTPS Redirect (Production) ──────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check bypass (no redirect needed)
        location /health {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS Server ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL Configuration ───────────────────────────────
        # Replace with your actual cert paths (Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;

        # ── Security Headers ────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health Check Endpoints ──────────────────────────
        location /health {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;  # Don't log health checks
        }

        location /health/ready {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ── API Routes → FastAPI Backend ────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi_backend;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Connection keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Auth Login — Stricter Rate Limiting ─────────────
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Upload Endpoints — Higher Body Size Limit ───────
        location /api/v1/upload/ {
            limit_req zone=api_limit burst=5 nodelay;

            # Allow up to 25MB uploads (Excel + photos)
            client_max_body_size 25m;

            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeouts for file processing
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Webhook Endpoints — WhatsApp & Razorpay ─────────
        location /api/v1/webhooks/ {
            limit_req zone=webhook_limit burst=30 nodelay;

            # Allow larger payloads from Meta
            client_max_body_size 10m;

            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass raw body for HMAC signature verification
            proxy_set_header X-Razorpay-Signature $http_x_razorpay_signature;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── FastAPI Docs (Dev Only) ─────────────────────────
        location /docs {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /redoc {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /openapi.json {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Frontend Static Assets — Cache Aggressively ─────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;

            # Cache static assets for 1 year (Vite uses content hashes)
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Frontend App — React SPA ────────────────────────
        location / {
            proxy_pass http://frontend_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Vite hot module reload)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_http_version 1.1;
        }

        # ── Error Pages ─────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"error": "Too many requests. Please try again later."}';
        }
    }
}
